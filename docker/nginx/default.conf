## Oyla — nginx vhost
## Güvenlik başlıkları her response'ta gönderilir.
## HTTPS terminate eden reverse proxy varsa HSTS doğru çalışır.

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 10M;

    # ---- Güvenlik başlıkları (always — 4xx/5xx için de) ----
    # Clickjacking
    add_header X-Frame-Options "DENY" always;
    # MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Eski XSS auditor (legacy, ama zarar vermez)
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer leak'i engelle
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Tarayıcı yetenekleri (geo, mic, cam vs. kullanılmıyor)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), fullscreen=(self), display-capture=()" always;
    # Cross-origin isolation
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # HSTS — sadece HTTPS arkasında reverse proxy varsa anlamlı, 1 yıl + preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy
    # Bootstrap ve fontlar self-host'a alındığında 'self' yeterli; geçiş süresi için
    # cdn.jsdelivr.net + fonts.googleapis/gstatic da whitelisted.
    # NOT: 'unsafe-inline' kaldırılması için view'lardaki inline <style> blokları
    # /public/assets/css/* altına taşınmalı (FAZ 3 kapsamında yapılıyor).
    # Tüm vendor (Bootstrap Icons) self-host edildi; CDN whitelist'i artık yok.
    # Google Fonts (Source Serif + Plex Sans) hala fonts.googleapis/gstatic'ten geliyor.
    # script-src 'unsafe-inline' geçici — birkaç view inline <script> kullanıyor; ayrı
    # dosyalara taşındıkça kaldırılacak.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        # FastCGI buffer ve timeout (uzun PDF üretiminde yetebilsin)
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60s;
    }

    # Static asset cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        # Security headers'ı statik'lere de kopyala
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Dotfile erişimini engelle (.env, .git, .htaccess vs.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # composer.json, .lock vs. PHP-dışı kaynak dosyalar
    location ~* \.(env|lock|md|json|sql|conf|sh|bak)$ {
        deny all;
        return 404;
    }

    # PHP-FPM ping/status (sadece internal)
    location ~ ^/(fpm-status|fpm-ping)$ {
        access_log off;
        allow 127.0.0.1;
        deny all;
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $fastcgi_script_name;
    }

    # Disable server tokens
    server_tokens off;
}
