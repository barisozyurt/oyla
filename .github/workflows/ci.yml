name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    name: Static Analysis (no DB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, gd, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Lint PHP syntax
        run: find app config public bin database tests -name "*.php" -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Run unit tests (no DB-bound)
        env:
          APP_ENV: testing
          APP_SECRET: test_secret_app_64_chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          TOKEN_SECRET: test_secret_token_64_chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: vendor/bin/phpunit --testsuite Unit --colors=always

  integration-tests:
    name: Integration Tests (with DB)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: ci_root_pass_strong
          MYSQL_DATABASE: oyla_test
          MYSQL_USER: oyla_test
          MYSQL_PASSWORD: ci_test_pass_strong
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, gd, zip
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -pci_root_pass_strong && break
            sleep 2
          done

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: oyla_test
          DB_USER: oyla_test
          DB_PASS: ci_test_pass_strong
        run: php bin/migrate

      - name: Run integration tests
        env:
          APP_ENV: testing
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: oyla_test
          DB_USER: oyla_test
          DB_PASS: ci_test_pass_strong
          APP_SECRET: ci_secret_app_64_chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          TOKEN_SECRET: ci_secret_token_64_chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          SMS_MOCK: 'true'
        run: vendor/bin/phpunit --testsuite Integration --colors=always
