## Geliştirme (development) compose dosyası.
## Production deploy için docker-compose.prod.yml kullanılmalıdır.
##
## Parolalar .env dosyasından okunur — bu dosyada plaintext credential YOKTUR.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  php:
    build: ./docker/php
    user: "1000:1000"
    volumes:
      - .:/var/www/html
      - ./logs:/var/www/html/logs
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Development: OPcache açık ama revalidate=1 ile dosya değişimi anında yansır
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    restart: unless-stopped

  mariadb:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD .env içinde tanımlanmalı}
      MYSQL_DATABASE: ${DB_NAME:-oyla}
      MYSQL_USER: ${DB_USER:?DB_USER .env içinde tanımlanmalı}
      MYSQL_PASSWORD: ${DB_PASS:?DB_PASS .env içinde tanımlanmalı}
    # Port'u dışarı açma, sadece compose network içinden erişilebilsin.
    # Local debug için aşağıdaki satırı geçici olarak açabilirsiniz.
    # ports:
    #   - "127.0.0.1:3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mariadb_data:
