version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build: ./docker/php
    volumes:
      - .:/var/www/html
    depends_on:
      - mariadb
    env_file:
      - .env
    environment:
      - PHP_OPCACHE_ENABLE=0

  mariadb:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: root_sifre
      MYSQL_DATABASE: oyla
      MYSQL_USER: oyla_user
      MYSQL_PASSWORD: GUCLU_SIFRE
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

volumes:
  mariadb_data:
